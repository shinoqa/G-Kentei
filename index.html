<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>G検定 学習アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:#0f1923;color:#e8eaf0;overflow:hidden;height:100dvh;width:100vw}

/* ── Home ── */
#home{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#home-header{padding:20px 24px 12px;background:linear-gradient(135deg,#1a2744 0%,#0f1923 100%)}
#home-header h1{font-size:1.5rem;font-weight:700;letter-spacing:.05em;color:#7eb3ff}
#home-header p{font-size:.8rem;color:#8892a4;margin-top:4px}
#chapter-list{flex:1;overflow-y:auto;padding:12px 16px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chapter-card{background:#1a2744;border-radius:16px;padding:18px 14px;cursor:pointer;transition:transform .15s,background .15s;position:relative;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;border:1.5px solid #243156}
.chapter-card:active{transform:scale(.97);background:#243156}
.chapter-card.done{border-color:#27ae60}
.chapter-card h2{font-size:.85rem;font-weight:700;line-height:1.4;color:#c8d8f8}
.chapter-card .progress-bar{height:4px;background:#243156;border-radius:2px;margin-top:10px;overflow:hidden}
.chapter-card .progress-fill{height:100%;border-radius:2px;transition:width .4s}
.chapter-card .progress-txt{font-size:.68rem;color:#6b7a99;margin-top:4px}
.chapter-card .chapter-summary{font-size:.7rem;color:#7a8aaa;line-height:1.55;margin-top:7px;margin-bottom:4px}
.chapter-card .badge-new{position:absolute;top:10px;right:10px;background:#3a7bfd;color:#fff;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:20px}

/* ── Map view ── */
#mapview{display:none;flex-direction:column;height:100dvh}
#map-header{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#1a2744;flex-shrink:0}
#map-header button{background:none;border:none;color:#7eb3ff;font-size:1.2rem;cursor:pointer;padding:4px 8px}
#map-header h2{font-size:1rem;font-weight:700;color:#c8d8f8;flex:1}
#map-container{flex:1;overflow:hidden;position:relative}
#map-svg-wrap{width:100%;height:100%;cursor:grab;touch-action:none}
#map-svg-wrap:active{cursor:grabbing}
svg#mindmap{width:100%;height:100%;overflow:visible}

/* ── Bottom sheet ── */
#sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;backdrop-filter:blur(2px)}
#sheet{position:fixed;bottom:0;left:0;right:0;background:#1a2744;border-radius:24px 24px 0 0;z-index:101;max-height:88dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#sheet.open{transform:translateY(0)}
#sheet-handle{width:36px;height:4px;background:#3a4a6a;border-radius:2px;margin:12px auto 0}
#sheet-scroll{flex:1;overflow-y:auto;padding:16px 20px 32px}
#sheet-term{font-size:1.2rem;font-weight:700;color:#7eb3ff;margin-bottom:4px}
#sheet-category{font-size:.72rem;color:#6b7a99;margin-bottom:14px}
#sheet-explanation{font-size:.9rem;line-height:1.7;color:#c8d8f8;background:#12213a;border-radius:12px;padding:14px;margin-bottom:20px}
#quiz-area h3{font-size:.85rem;font-weight:700;color:#f0c040;margin-bottom:12px}
.quiz-block{background:#12213a;border-radius:12px;padding:14px;margin-bottom:14px}
.quiz-q{font-size:.85rem;line-height:1.6;margin-bottom:10px;color:#c8d8f8}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.quiz-opt{background:#1e3050;border:1.5px solid #2c3f6a;border-radius:10px;padding:10px 12px;font-size:.82rem;color:#b0c0e0;cursor:pointer;text-align:left;transition:background .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
.quiz-opt:active{background:#243560}
.quiz-opt.correct{background:#1a4a30;border-color:#27ae60;color:#5dde8a}
.quiz-opt.wrong{background:#4a1a1a;border-color:#e74c3c;color:#f08080}
.quiz-opt.disabled{pointer-events:none}
.quiz-exp{display:none;font-size:.78rem;color:#a0b4cc;background:#0f1923;border-radius:8px;padding:10px;margin-top:8px;line-height:1.6}
.quiz-exp.show{display:block}
.quiz-reset-btn{width:100%;margin-top:14px;padding:10px;background:#1e3050;border:1.5px solid #3a4a6a;border-radius:10px;color:#8892a4;font-size:.82rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
.quiz-reset-btn:active{background:#243560}
#sheet-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#6b7a99;font-size:1.4rem;cursor:pointer}

/* ── Search overlay ── */
#search-overlay{display:none;flex-direction:column;position:fixed;inset:0;background:#0f1923;z-index:200}
#search-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#1a2744;flex-shrink:0}
#search-input-wrap{flex:1;display:flex;align-items:center;background:#0f1923;border-radius:10px;padding:8px 12px;gap:8px;border:1px solid #243156}
#search-input{flex:1;background:none;border:none;outline:none;color:#e8eaf0;font-size:.95rem;font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif}
#search-input::placeholder{color:#3a4560}
#search-cancel{background:none;border:none;color:#7eb3ff;font-size:.85rem;cursor:pointer;padding:4px 2px;white-space:nowrap}
#search-results{flex:1;overflow-y:auto}
.search-item{display:flex;flex-direction:column;padding:13px 20px;border-bottom:1px solid #141c2e;cursor:pointer;position:relative;gap:3px}
.search-item:active{background:#1a2744}
.search-term{font-size:.9rem;font-weight:700;color:#c8d8f8}
.search-path{font-size:.7rem;color:#5a6a88}
.search-db{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:.6rem;padding:2px 7px;border-radius:20px;border:1px solid}
.search-db.has{background:#1a4a30;color:#5dde8a;border-color:#27ae60}
.search-db.none{background:#1a1e2e;color:#404460;border-color:#303450}
.search-empty{padding:40px 20px;color:#3a4560;font-size:.85rem;text-align:center}
#search-open-btn{background:none;border:none;color:#7eb3ff;font-size:1.2rem;cursor:pointer;padding:4px 6px;line-height:1}

/* ── Syllabus overlay ── */
#syllabus-overlay{display:none;flex-direction:column;position:fixed;inset:0;background:#0f1923;z-index:200}
#syllabus-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#1a2744;flex-shrink:0}
#syllabus-hdr h2{font-size:1rem;font-weight:700;color:#c8d8f8}
#syllabus-close-btn{background:none;border:none;color:#6b7a99;font-size:1.3rem;cursor:pointer}
#syllabus-list{flex:1;overflow-y:auto;padding-bottom:32px}
.syl-ch{border-bottom:1px solid #141c2e}
.syl-ch-hd{display:flex;align-items:center;gap:10px;padding:13px 20px;cursor:pointer;background:#1a2744}
.syl-ch-hd:active{background:#243156}
.syl-ch-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.syl-ch-title{font-size:.88rem;font-weight:700;color:#c8d8f8;flex:1}
.syl-ch-arrow{color:#5a6a88;font-size:.7rem;transition:transform .2s}
.syl-ch-body{display:none;padding:4px 0 12px}
.syl-ch-body.open{display:block}
.syl-l1{padding:10px 20px 4px 36px;font-size:.78rem;font-weight:700;color:#7eb3ff}
.syl-l2-row{padding:2px 20px 0 48px}
.syl-l2-label{font-size:.71rem;font-weight:600;color:#5a6a88;padding:4px 0 5px}
.syl-terms{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.syl-tag{font-size:.65rem;padding:3px 9px;border-radius:14px;cursor:pointer;border:1px solid;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.syl-tag:active{opacity:.6}
.syl-tag.reg{color:#c8d8f8;background:rgba(10,18,34,0.9)}
.syl-tag.unreg{color:#404460;border-color:#363a54;background:rgba(22,24,38,0.75)}
#syllabus-open-btn{background:none;border:none;color:#7eb3ff;font-size:1.3rem;cursor:pointer;padding:4px 6px;line-height:1}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2c3f6a;border-radius:2px}
</style>
</head>
<body>

<!-- ── Home screen ── -->
<div id="home">
  <div id="home-header">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h1>G検定 学習アプリ</h1>
        <p>2026年7月4日 試験合格を目指す</p>
      </div>
      <div style="display:flex;gap:2px">
        <button id="syllabus-open-btn" title="シラバス">☰</button>
        <button id="search-open-btn" title="検索">🔍</button>
      </div>
    </div>
  </div>
  <div id="chapter-list" id="chapter-list"></div>
</div>

<!-- ── Map screen ── -->
<div id="mapview">
  <div id="map-header">
    <button id="btn-back">←</button>
    <h2 id="map-title"></h2>
    <button id="search-open-btn-map" title="検索">🔍</button>
  </div>
  <div id="map-container">
    <div id="map-svg-wrap">
      <svg id="mindmap" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
</div>

<!-- ── Syllabus overlay ── -->
<div id="syllabus-overlay">
  <div id="syllabus-hdr">
    <h2>G検定 シラバス</h2>
    <button id="syllabus-close-btn">✕</button>
  </div>
  <div id="syllabus-list"></div>
</div>

<!-- ── Search overlay ── -->
<div id="search-overlay">
  <div id="search-header">
    <div id="search-input-wrap">
      <span style="color:#3a4560;font-size:.9rem">🔍</span>
      <input id="search-input" type="search" placeholder="用語・キーワードを検索..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button id="search-cancel">キャンセル</button>
  </div>
  <div id="search-results"></div>
</div>

<!-- ── Bottom sheet ── -->
<div id="sheet-bg"></div>
<div id="sheet">
  <div id="sheet-handle"></div>
  <button id="sheet-close">✕</button>
  <div id="sheet-scroll">
    <div id="sheet-term"></div>
    <div id="sheet-category"></div>
    <div id="sheet-explanation"></div>
    <div id="quiz-area"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  SYLLABUS DATA  (第1章のみMVP)
// ══════════════════════════════════════════════════════════════
const CHAPTERS = [
{
  id:1, title:"第1章 人工知能（AI）とは",
  color:"#3a7bfd",
  branches:[
    {l1:"人工知能の定義", children:[
      {l2:"AIのレベル分類", terms:["単純な制御プログラム","古典的なAI","機械学習","深層学習"]},
      {l2:"AI効果", terms:["AI効果"]},
      {l2:"AIとロボット", terms:["ロボット≠AI","ソフトウェアAI"]},
    ]},
    {l1:"AIが議論される問題", children:[
      {l2:"汎用AI vs 特化型AI", terms:["AGI（汎用人工知能）","特化型AI"]},
      {l2:"チューリングテスト", terms:["模倣ゲーム","判定者・機械・人間"]},
      {l2:"シンギュラリティ", terms:["技術的特異点","2045年問題"]},
      {l2:"フレーム問題", terms:["無限のコンテキスト問題"]},
      {l2:"シンボルグラウンディング問題", terms:["記号と意味の対応づけ"]},
      {l2:"中国語の部屋", terms:["意味理解の限界"]},
      {l2:"身体性", terms:["身体と知性の関係"]},
    ]},
    {l1:"AIの歴史的背景", children:[
      {l2:"ダートマス会議(1956)", terms:["AIという言葉の誕生","マッカーシー"]},
      {l2:"第1次AIブーム", terms:["探索・推論","トイ・プロブレム"]},
      {l2:"第2次AIブーム", terms:["エキスパートシステム"]},
      {l2:"第3次AIブーム", terms:["ディープラーニング","ビッグデータ"]},
    ]},
  ]
},
{id:2,title:"第2章 人工知能をめぐる動向",color:"#e67e22",branches:[
  {l1:"探索・推論", children:[
    {l2:"探索手法", terms:["深さ優先探索","幅優先探索","最良優先探索","A*アルゴリズム"]},
    {l2:"ゲーム木探索", terms:["Mini-Max法","α-β刈り","モンテカルロ木探索"]},
    {l2:"命題論理・述語論理", terms:["論理式","推論規則"]},
  ]},
  {l1:"知識表現・エキスパートシステム", children:[

    {l2:"エキスパートシステム", terms:["MYCIN","R1/XCON","Watson"]},
    {l2:"知識グラフ", terms:["エンティティ・関係","Google Knowledge Graph"]},
  ]},
  {l1:"機械学習の台頭", children:[
    {l2:"背景", terms:["インターネット普及","ビッグデータ","計算資源向上"]},
    {l2:"次元の呪い", terms:["高次元での疎らな分布"]},
    {l2:"統計的機械学習", terms:["確率モデル","ベイズ学習"]},
  ]},
  {l1:"ディープラーニングの登場", children:[
    {l2:"AlexNet(2012)", terms:["ImageNet大会優勝","CNN"]},
    {l2:"GPU並列計算", terms:["NVIDIA CUDA"]},
    {l2:"第3次AIブーム", terms:["画像・音声・言語への応用"]},
    {l2:"基盤モデル", terms:["大規模事前学習モデル","GPT・BERT"]},
  ]},
]},
{id:3,title:"第3章 機械学習の具体的手法",color:"#2ecc71",branches:[
  {l1:"教師あり学習（回帰）", children:[
    {l2:"線形回帰", terms:["最小二乗法","決定係数R²"]},
    {l2:"正則化回帰", terms:["Ridge(L2)","Lasso(L1)","ElasticNet"]},
    {l2:"多項式回帰", terms:["非線形を線形で近似"]},
  ]},
  {l1:"教師あり学習（分類）", children:[

    {q:"多項式回帰の過学習対策として正しいものはどれか？",

    {q:"クラス不均衡データで精度（Accuracy）の代わりに使うべき指標はどれか？",

  ]
},
"マルコフ連鎖・割引率":{
  term:"マルコフ連鎖・割引率γ（強化学習）",category:"第3章 > 強化学習 > マルコフ決定過程(MDP)",
  explanation:"マルコフ連鎖：次の状態が現在の状態のみに依存し過去の履歴に依存しない確率過程（マルコフ性）。MDPの基盤。割引率γ（0≦γ＜1）：将来の報酬を現在価値に割り引くパラメータ。γ=0は即時報酬のみ評価、γ→1は長期報酬を重視。累積報酬G_t=R_{t+1}+γR_{t+2}+γ²R_{t+3}+…として計算する。γが小さいほど近視眼的、大きいほど遠視的（長期計画）な行動をエージェントが学習する。",
  questions:[
    {q:"マルコフ連鎖の「マルコフ性」が意味することはどれか？",
     opts:["過去の全履歴が必要","次の状態は現在の状態のみで決まり過去の履歴に依存しない","行動がランダム","報酬が常に正"],ans:1,
     exp:"マルコフ性：P(s_{t+1}|s_t,a_t)は現在の状態s_tと行動a_tのみで決まり、それ以前の履歴s_{t-1}…に依存しない性質。"},
    {q:"強化学習の割引率γが0に近い場合のエージェントの行動はどれか？",
     opts:["長期的な報酬を重視する","即時報酬のみを最大化する近視眼的な行動をとる","ランダムに行動する","常に探索する"],ans:1,
     exp:"γ→0は近い将来の報酬しか考慮しない近視眼的な行動。γ→1は遠い将来の報酬も重視した長期計画的な行動を促す。"},
    {q:"割引累積報酬G_tの計算式はどれか？",
     opts:["G_t=R_{t+1}のみ","G_t=R_{t+1}+γR_{t+2}+γ²R_{t+3}+…（幾何級数的に減衰）","G_t=ΣR_t（全て等価）","G_t=γ×R_t"],ans:1,
     exp:"割引累積報酬は未来の報酬をγのべき乗で割り引いて合計する。γが1未満なので無限の将来まで和が収束する。"},
  ]
},
"ブースティング":{
  term:"ブースティング（Boosting）",category:"第3章 > 教師あり学習（分類） > 勾配ブースティング",
  explanation:"弱学習器（少し精度が高い分類器）を逐次的に組み合わせて強力な学習器を作るアンサンブル手法。前の学習器が誤分類したサンプルに重きを置いて次の学習器を学習する。バギング（Bagging）との違い：バギングは並列に学習するが、ブースティングは逐次的に学習する。代表的手法：①AdaBoost（Adaptive Boosting）②勾配ブースティング③XGBoost④LightGBM。表形式データの精度上位を占めることが多い。",

     exp:"ブースティングは前の弱学習器の誤分類に重みをつけて次の学習器を訓練する逐次的手法。バギングは独立並列学習。"},
    {q:"勾配ブースティングの代表的な実装として正しいものはどれか？",

    {q:"ブースティングで学習器を逐次的に追加する際の基準はどれか？",
     opts:["全サンプルを均等に使う","前の学習器が誤分類したサンプルに大きな重みを与えて次の学習器を訓練する","ランダムに選択する","データを削減する"],ans:1,
     exp:"ブースティングは前の弱学習器の誤分類サンプルの重みを大きくし、「難しい問題」に特化した次の学習器を学習させる。"},

"決定木の剪定":{
  term:"決定木の剪定（Pruning）",category:"第3章 > 教師あり学習（分類） > 決定木",
  explanation:"成長させすぎた決定木を刈り込んで過学習を防ぐ手法。①事前剪定（Pre-pruning）：木を成長させる際に一定条件（最大深さ・最小サンプル数・最小情報利得）を満たさなければ分割を停止する。②事後剪定（Post-pruning）：完全に成長させた木から、検証データ性能を落とさない範囲でリーフノードを刈り込む。コストと複雑性のトレードオフを制御するハイパーパラメータ（max_depth・min_samples_split等）として実装される。",
  questions:[
    {q:"決定木の「過学習」を防ぐための剪定（Pruning）とはどのような操作か？",
     opts:["木を深くする","成長させすぎた木をリーフ側から刈り込んで汎化性能を向上させる","データを増やす","活性化関数を変える"],ans:1,
     exp:"剪定は過学習した複雑な決定木を刈り込み、訓練データへの過剰適合を防いでテストデータへの汎化性能を高める。"},
    {q:"事前剪定（Pre-pruning）の手法として正しいものはどれか？",
     opts:["完全に木を成長させてから刈り込む","最大深さや最小サンプル数の条件を設定し分割を途中で停止する","全ての分岐を削除する","データを削除する"],ans:1,
     exp:"事前剪定はmax_depth・min_samples_split等のハイパーパラメータで木の成長を途中で止め、過学習を予防する。"},
    {q:"scikit-learnの決定木で過学習を防ぐためのパラメータとして正しいものはどれか？",
     opts:["learning_rate","max_depth・min_samples_split・min_impurity_decrease","batch_size","dropout_rate"],ans:1,
     exp:"scikit-learnではmax_depth（最大深さ）・min_samples_split（分割最小サンプル数）等で木の成長を制御して剪定を実現する。"},
  ]
},
"価値関数":{
  term:"価値関数（Value Function）",category:"第3章 > 強化学習 > 方策と価値",
  explanation:"強化学習において、ある状態（または状態-行動ペア）から将来得られる期待累積報酬を推定する関数。①状態価値関数V(s)：状態sから方策πに従った場合の期待累積報酬。②行動価値関数Q(s,a)：状態sで行動aを取り、その後方策πに従った場合の期待累積報酬。Q学習はQ(s,a)を直接学習する価値ベース手法。方策勾配法は方策を直接最適化するのに対し、価値ベース手法は価値関数を通じて間接的に最適方策を求める。",
  questions:[
    {q:"状態価値関数V(s)が表すものはどれか？",
     opts:["次の状態の確率","ある状態sから方策πに従った場合の期待累積報酬","即時報酬のみ","行動の確率"],ans:1,
     exp:"V(s)=E[G_t|s_t=s]。状態sから始めて方策πに従って行動した場合に期待できる割引累積報酬の期待値。"},
    {q:"Q値（行動価値関数Q(s,a)）が表すものはどれか？",
     opts:["状態のみの価値","状態sで行動aを取った後に方策πに従って得られる期待累積報酬","即時報酬","方策の確率"],ans:1,
     exp:"Q(s,a)は状態sで行動aを選択した後の期待累積報酬。Q学習はQ値テーブルを反復更新して最適方策を学習する。"},
    {q:"価値ベース手法と方策ベース手法の違いはどれか？",
     opts:["同じもの","価値ベースは価値関数を学習して間接的に方策を決め、方策ベースは方策を直接最適化する","価値ベースは教師あり学習","方策ベースはQ値を使う"],ans:1,
     exp:"価値ベース（Q学習・DQN等）は価値関数から最良行動を導く。方策ベース（REINFORCE・PPO）は方策πを直接最適化する。"},
  ]
},
"ROC曲線・AUC詳細":{
  term:"ROC曲線とAUCの解釈",category:"第3章 > モデルの選択・評価 > 評価指標（分類）",
  explanation:"ROC曲線（Receiver Operating Characteristic）：横軸FPR（偽陽性率）・縦軸TPR（再現率）のグラフ。分類しきい値を変化させた時のTPR-FPRのトレードオフを描く。AUC（Area Under the Curve）：ROC曲線の下の面積。0〜1で表し1が完璧、0.5はランダム分類（対角線）。クラス不均衡データでも有効。解釈：AUC=0.8なら「ランダムに選んだ正例と負例で、正例のスコアが高い確率が80%」。",
  questions:[
    {q:"ROC曲線の横軸と縦軸として正しいものはどれか？",
     opts:["精度と再現率","偽陽性率（FPR）と真陽性率（TPR＝再現率）","適合率と再現率","精度と損失"],ans:1,
     exp:"ROC曲線はFPR（FP/(FP+TN)）を横軸、TPR（TP/(TP+FN)=再現率）を縦軸として分類しきい値を変化させてプロットする。"},
    {q:"AUC=0.5の分類器が意味することはどれか？",
     opts:["完璧な分類","ランダムな分類（対角線）と同等の性能","分類が不可能","精度50%"],ans:1,
     exp:"AUC=0.5はROC曲線が対角線（ランダム分類）と一致することを意味し、モデルが識別能力を持たない状態。"},
    {q:"AUCがクラス不均衡データで有用な理由はどれか？",
     opts:["計算が簡単","しきい値に依存せず正例・負例の相対的ランキングを評価するため不均衡の影響を受けにくい","精度より常に高い値になる","データを増やせる"],ans:1,
     exp:"AUCは「正例のスコアが負例より高い確率」を表しクラス比率に依存しないため、不均衡データでも安定した評価指標となる。"},
  ]
},

"データドリフト":{
  term:"データドリフト",category:"第7章 > モデル運用・モニタリング",

"Word2Vec":{

  questions:[

    {q:"Word2Vecの有名な例として正しいものはどれか？",opts:["「犬+猫=ペット」","「王様−男+女≒女王」","「赤+青=紫」","「大きい−小さい=中くらい」"],ans:1,exp:"Word2Vecの分散表現では「王様−男+女≒女王」のような意味の演算が可能になる。"},
    {q:"Word2VecのSkip-gramモデルの学習タスクはどれか？",opts:["中心語から周辺語を予測","周辺語から中心語を予測","文章全体を分類","画像と単語を対応づける"],ans:0,exp:"Skip-gramは中心語から周辺語を予測するモデル。CBOWは周辺語から中心語を予測する逆の構造。"},
  ]
},
"RAG":{
  term:"RAG（Retrieval-Augmented Generation）",category:"第6章 > 自然言語処理(NLP)",
  explanation:"検索拡張生成。LLMが回答する際に、外部データベース（文書・知識ベース）から関連文書を検索して文脈に加えてから回答生成する手法。LLMの知識カットオフ問題（最新情報を知らない）や幻覚（ハルシネーション）を軽減できる。企業内文書への質問応答などで実用化されている。",
  questions:[
    {q:"RAGが解決しようとする問題はどれか？",opts:["画像認識の精度不足","LLMの知識カットオフと幻覚（ハルシネーション）","音声認識の誤り","計算速度の低下"],ans:1,exp:"RAGはLLMが持たない最新情報を外部DBから検索して補完し、幻覚（ハルシネーション）を軽減する。"},
    {q:"RAGの処理の流れとして正しいものはどれか？",opts:["LLMのみで回答","質問→外部DB検索→文脈に追加→LLMで回答生成","外部DBのみで回答","ファインチューニングして回答"],ans:1,exp:"RAGは質問に関連する文書を外部DBから検索し、それをLLMのプロンプトに追加して回答を生成する。"},
    {q:"RAGの活用例として最も適切なものはどれか？",opts:["画像生成","企業内文書への質問応答システム","音声合成","クラスタリング"],ans:1,exp:"企業内マニュアル・規程・議事録などをRAGの外部DBとし、社員の質問に自然言語で回答するシステムが典型例。"},
  ]
},
"Chain-of-Thought":{
  term:"Chain-of-Thought（CoT）プロンプティング",category:"第6章 > 自然言語処理(NLP) > プロンプトエンジニアリング",
  explanation:"LLMに「ステップごとに考えてください」と指示し、推論過程を明示させるプロンプト手法。複雑な数学・論理問題での精度が大幅に向上する。「Let's think step by step」を加えるだけで精度が上がることが実証されている。Few-shotと組み合わせると特に効果的。",
  questions:[
    {q:"Chain-of-Thought（CoT）プロンプティングの効果はどれか？",opts:["画像認識の精度向上","推論過程を明示させて複雑な問題の精度向上","学習データを増やす","モデルの軽量化"],ans:1,exp:"CoTはLLMに推論ステップを明示させることで、複雑な数学・論理問題での正確さが大幅に向上する。"},
    {q:"CoTプロンプティングの代表的なトリガー文として正しいものはどれか？",opts:["「答えだけ出力してください」","「Let's think step by step（ステップごとに考えてください）」","「日本語で答えてください」","「短く答えてください」"],ans:1,exp:"「Let's think step by step」とプロンプトに加えるだけでLLMの推論精度が向上することが示されている。"},
    {q:"CoTが最も効果的な場面はどれか？",opts:["単純な事実確認","複雑な数学・論理的推論問題","画像の説明","単語の翻訳"],ans:1,exp:"CoTは複数ステップの推論が必要な数学問題や論理的思考を要するタスクで特に効果的。"},
  ]
},
"Zero-shot":{
  term:"Zero-shot / Few-shot学習",category:"第6章 > 自然言語処理(NLP) > プロンプトエンジニアリング",
  explanation:"Zero-shot：例示なしで指示だけでタスクを実行させる。Few-shot：プロンプト中に少数の例（1〜数件）を示してタスクを実行させる。どちらもファインチューニングなしで実現できる点が強み。GPT-3以降の大規模モデルで実用的な精度が出るようになった。",
  questions:[
    {q:"Zero-shot学習の説明として正しいものはどれか？",opts:["大量の例を示して学習","例示なしで指示だけでタスクを実行","ファインチューニングが必要","訓練データが必要"],ans:1,exp:"Zero-shotは例示（デモンストレーション）なしで指示のみでLLMにタスクを実行させる手法。"},
    {q:"Few-shot学習の特徴として正しいものはどれか？",opts:["数千件の学習データが必要","プロンプト内の少数例でタスクを誘導する","ファインチューニングが必要","モデル構造を変える"],ans:1,exp:"Few-shotはプロンプト内に少数例（入出力ペア）を示すことでLLMを誘導する。ファインチューニング不要。"},
    {q:"Zero-shotとFew-shotを比較した場合の正しい記述はどれか？",opts:["Zero-shotは常にFew-shotより高精度","Few-shotは例を示すためZero-shotより精度が高い傾向がある","両者は全く同じ","Zero-shotはファインチューニングが必要"],ans:1,exp:"例を示すFew-shotの方がタスクの意図をLLMに伝えやすく、一般的にZero-shotより高精度になりやすい。"},
  ]
},
"GAN":{
  term:"GAN（Generative Adversarial Network）",category:"第6章 > データ生成・生成AI",
  explanation:"2014年にIan Goodfellowが提案した生成モデル。Generator（生成器）とDiscriminator（識別器）の2つのNNが競合しながら学習する。GeneratorはDiscriminatorを騙すように偽データを生成し、Discriminatorは本物と偽物を見分けようとする。この競合により高品質な画像などを生成できる。",
  questions:[
    {q:"GANを構成する2つのネットワークはどれか？",opts:["エンコーダとデコーダ","GeneratorとDiscriminator","AttentionとFFN","エンコーダとAttention"],ans:1,exp:"GANはデータを生成するGenerator（生成器）と本物・偽物を見分けるDiscriminator（識別器）の2NNで構成される。"},
    {q:"GANの学習の仕組みとして正しいものはどれか？",opts:["GeneratorとDiscriminatorが協力して学習","GeneratorはDiscriminatorを騙すよう・DiscriminatorはGeneratorを見破るよう競合","1つのモデルだけで学習","教師ラベルが必要"],ans:1,exp:"GeneratorとDiscriminatorが競合（Adversarial）することで互いが鍛えられ、高品質な生成が実現する。"},
    {q:"GANの学習が不安定になる典型的な問題はどれか？",opts:["過学習","Mode Collapse（生成の多様性が失われる）","データ不足","計算速度"],ans:1,exp:"Mode Collapse（モード崩壊）はGANでGeneratorが一部のパターンしか生成しなくなる典型的な不安定問題。"},
  ]
},
"Stable Diffusion":{
  term:"Stable Diffusion / Diffusion Model",category:"第6章 > データ生成・生成AI > Diffusion Model",
  explanation:"ノイズを段階的に除去して画像を生成する生成モデル。順方向（ノイズを付加）と逆方向（ノイズを除去）の2プロセスから構成される。Stable Diffusion（2022年）はオープンソースで公開され、テキストから高品質な画像を生成できる。DALL-E・Midjourneyも同系統の手法。",
  questions:[
    {q:"Diffusion Modelの画像生成の仕組みはどれか？",opts:["GANと同じくGeneratorで生成","ノイズを段階的に除去して画像を生成","潜在空間からサンプリング","テンプレートを合成"],ans:1,exp:"Diffusion Modelはノイズから出発し、学習したノイズ除去プロセスを逆方向に適用して画像を生成する。"},
    {q:"Stable Diffusionの特徴として正しいものはどれか？",opts:["非公開の独自モデルのみ","オープンソースで公開されたテキスト→画像生成モデル","音声のみ生成できる","企業向けのみ"],ans:1,exp:"Stable DiffusionはオープンソースのDiffusion Modelベースのテキスト→画像生成モデル。"},
    {q:"DALL-E・Midjourney・Stable Diffusionに共通する技術はどれか？",opts:["GAN（敵対的生成ネットワーク）","Diffusion Model（拡散モデル）","VAE（変分オートエンコーダ）","RNN"],ans:1,exp:"DALL-E 2以降・Midjourney・Stable DiffusionはいずれもDiffusion Modelをベースとした画像生成モデル。"},
  ]
},
"RLHF":{
  term:"RLHF（人間フィードバックによる強化学習）",category:"第6章 > 転移学習・ファインチューニング",
  explanation:"Reinforcement Learning from Human Feedback。人間の評価者がモデルの出力を評価し、そのフィードバックで報酬モデルを学習し、強化学習でLLMを人間の好みに合わせて調整する手法。ChatGPTの訓練に使われた。有害・不誠実な応答を減らし、有用・無害・誠実な応答を増やすことが目的。",
  questions:[
    {q:"RLHFが使われた代表的なシステムはどれか？",opts:["AlexNet","AlphaGo","ChatGPT","Word2Vec"],ans:2,exp:"ChatGPTはRLHFを用いて人間の好みに合わせた応答を生成するよう調整されたLLM。"},
    {q:"RLHFの目的として正しいものはどれか？",opts:["モデルを軽量化する","LLMの出力を人間の好みや価値観に合わせて調整する","画像認識精度を上げる","計算コストを下げる"],ans:1,exp:"RLHFは人間の評価フィードバックを使い、有用・無害・誠実な応答を生成するようLLMを調整する。"},
    {q:"RLHFのプロセスで正しい順序はどれか？",opts:["強化学習→人間評価→報酬モデル","事前学習→人間フィードバックで報酬モデル学習→強化学習で調整","ファインチューニングのみ","データ収集→k-means→分類"],ans:1,exp:"RLHF：LLMを事前学習→人間評価で報酬モデル学習→PPO等の強化学習でLLMを調整の3ステップ。"},
  ]
},
"LoRA":{
  term:"LoRA（Low-Rank Adaptation）",category:"第6章 > 転移学習・ファインチューニング",
  explanation:"大規模モデルを効率的にファインチューニングするPEFT（Parameter-Efficient Fine-Tuning）手法。元モデルの重みを固定し、重み行列を低ランク行列の積に近似した小さな追加パラメータのみを学習する。GPUメモリを大幅に削減でき、学習が速い。LLM・画像生成モデルのカスタマイズで広く使われる。",
  questions:[
    {q:"LoRAの特徴として正しいものはどれか？",opts:["元モデルの全パラメータを更新する","元重みを固定し低ランクの追加パラメータのみ学習する","データを増やす手法","モデル構造を変える"],ans:1,exp:"LoRAは元モデルを固定し、低ランク行列の積で近似した少数の追加パラメータのみ学習する効率的なFT手法。"},
    {q:"LoRAを使う主な利点はどれか？",opts:["推論速度が上がる","GPUメモリを大幅削減してファインチューニングできる","常に完全FTより高精度","データが不要"],ans:1,exp:"LoRAは全パラメータでなく少数の追加パラメータのみ学習するため、GPUメモリを大幅に削減できる。"},
    {q:"LoRAが属する手法のカテゴリはどれか？",opts:["データ拡張","PEFT（パラメータ効率的ファインチューニング）","知識蒸留","量子化"],ans:1,exp:"LoRAはPEFT（Parameter-Efficient Fine-Tuning）の代表的な手法で、少数パラメータで効率的なFTを実現する。"},
  ]
},
"SHAP":{
  term:"SHAP（SHapley Additive exPlanations）",category:"第6章 > モデルの解釈性",
  explanation:"ゲーム理論のShapley値を使い、各特徴量がモデルの予測にどれだけ貢献しているかを定量的に説明する手法。モデルに依存せず（モデルアグノスティック）、XGBoostから深層学習まで幅広いモデルに適用できる。特徴量の正負の貢献度と大きさを示せる。XAI（説明可能AI）の代表手法。",
  questions:[
    {q:"SHAPが説明するものとして正しいものはどれか？",opts:["モデルの全体精度","各特徴量が予測に与えた貢献度","クラスタの数","訓練速度"],ans:0,exp:"SHAPはゲーム理論のShapley値を使い、各特徴量がモデルの個別予測にどれだけ貢献したかを示す。"},
    {q:"SHAPの特徴として正しいものはどれか？",opts:["特定のモデル専用","モデルアグノスティック（モデルに依存しない）","必ずSVMと組み合わせる","画像のみに使える"],ans:1,exp:"SHAPはモデルアグノスティックで、線形モデル・決定木・ニューラルネットワークなど幅広いモデルに適用できる。"},
    {q:"SHAPが属するAIの分野はどれか？",opts:["生成AI","XAI（説明可能AI）","強化学習","転移学習"],ans:1,exp:"SHAPはAIの判断根拠を説明するXAI（説明可能AI・Explainable AI）の代表的な手法。"},
  ]
},
"Grad-CAM":{
  term:"Grad-CAM",category:"第6章 > モデルの解釈性",

  questions:[

    {q:"Grad-CAMが主に適用される問題はどれか？",opts:["テキスト分類","CNNによる画像認識の説明","音声認識","強化学習"],ans:1,exp:"Grad-CAMはCNNの画像認識において「なぜその予測をしたか」を視覚的に説明するために使う。"},
    {q:"Grad-CAMを医療AI分野で活用する主な目的はどれか？",opts:["診断を自動化する","AIが注目した画像領域を医師が確認しAIの信頼性を評価する","データを増やす","モデルを軽量化する"],ans:1,exp:"医療画像AIでGrad-CAMを使い、AIが注目した領域を医師が確認することでAIの判断の妥当性を検証できる。"},

"量子化":{
  term:"量子化（Quantization）",category:"第6章 > モデルの軽量化",
  explanation:"モデルの重みや計算を高精度（FP32）から低精度（INT8・FP16等）に変換してモデルを軽量化する手法。精度をわずかに犠牲にしながらメモリ使用量を削減し推論を高速化できる。INT8量子化では4倍のメモリ削減が可能。エッジデバイスへの展開に有効。",
  questions:[
    {q:"量子化の目的として正しいものはどれか？",opts:["モデルを深くする","重みの精度を下げてモデルを軽量化・高速化する","訓練データを増やす","精度を必ず上げる"],ans:1,exp:"量子化はFP32→INT8等へ精度を落としてモデルを軽量化・推論高速化し、エッジデバイス展開を可能にする。"},
    {q:"INT8量子化でのメモリ削減の目安はどれか？",opts:["約10分の1","約4分の1（FP32→INT8）","約2分の1","変わらない"],ans:1,exp:"FP32（4バイト）→INT8（1バイト）への量子化により、理論上約4倍のメモリ削減が可能になる。"},
    {q:"量子化が最も活用される場面はどれか？",opts:["クラウドでの学習","エッジデバイス・モバイルへのモデル展開","データ前処理","ハイパーパラメータ探索"],ans:1,exp:"量子化はスマートフォン・IoTデバイスなどリソースが限られたエッジデバイスへのモデル展開で特に有効。"},
  ]
},
"知識蒸留":{
  term:"知識蒸留（Knowledge Distillation）",category:"第6章 > モデルの軽量化",
  explanation:"大きなモデル（Teacher）の知識を小さなモデル（Student）に転移する軽量化手法。Studentは正解ラベルだけでなく、Teacherのソフトな確率分布（Soft Label）を模倣するように学習する。Soft Labelには大モデルが学習した関係性（「犬は猫に近い」等）が含まれ、効率的な学習が可能。",
  questions:[
    {q:"知識蒸留の仕組みとして正しいものはどれか？",opts:["大モデルの重みをそのままコピーする","大モデル（Teacher）の出力確率をSmall（Student）が模倣する","データを圧縮する","特徴量を削減する"],ans:1,exp:"知識蒸留はTeacherの出力（ソフトラベル）をStudentが模倣することで大モデルの知識を小モデルに転移する。"},
    {q:"知識蒸留でTeacherのSoft Labelが有効な理由はどれか？",opts:["計算が速い","クラス間の関係性（犬は猫に似ている等）の情報を含むから","データ量が増えるから","モデルが深くなるから"],ans:1,exp:"Soft Labelは「犬0.7・猫0.25・鳥0.05」のように類似クラスとの関係を含み、one-hotより豊富な情報を持つ。"},
    {q:"知識蒸留とモデルプルーニングの違いとして正しいものはどれか？",opts:["両者は全く同じ","知識蒸留は大→小モデルへの知識転移、プルーニングは不要な重みの削除","知識蒸留は重みを削除する","プルーニングは別モデルで学習する"],ans:1,exp:"知識蒸留はTeacher→Studentへの知識転移、プルーニングは同一モデルの不要な重みを削除する異なる手法。"},
  ]
},

     exp:"YOLOは画像を1回だけ処理してバウンディングボックスとクラス確率を同時に出力するワンショット検出器。"},

    {q:"YOLOが活用される代表的な応用分野はどれか？",
     opts:["音声合成","テキスト翻訳","自動運転・監視カメラ・ロボティクス","グラフデータ分析"],ans:2,

    {q:"DQNで学習を安定させる2つの工夫として正しいものはどれか？",
     opts:["ドロップアウトとL2正則化","経験再生（Experience Replay）と固定ターゲットネットワーク","バッチ正規化とウォームアップ","データ拡張とアンサンブル"],ans:1,
     exp:"経験再生（過去の経験をランダムにサンプリング）と固定ターゲットネットワーク（更新間隔を設ける）でQ値推定を安定させる。"},
    {q:"DQNの開発元と最初の成果はどれか？",

"LIME":{
  term:"LIME（Local Interpretable Model-agnostic Explanations）",category:"第6章 > モデルの解釈性",
  explanation:"任意のモデルの予測を局所的に解釈するXAI手法。ある入力サンプルの周辺で入力を微小変化させた近傍データを大量生成し、そこでの予測を解釈可能な線形モデルで近似する。モデル非依存（Model-agnostic）のためどんなモデルにも適用可能。SHAPが特徴量全体の貢献度を計算するのに対し、LIMEは特定の予測事例の局所的な説明に特化する。",
  questions:[
    {q:"LIMEの「Model-agnostic」が意味することはどれか？",
     opts:["モデルを学習しない","特定のモデル構造に依存せず任意のモデルに適用できる","ランダムモデルを使う","モデルを削除する"],ans:1,
     exp:"Model-agnosticは「モデル非依存」の意味。LIMEはブラックボックスモデルの予測を外部から近似するため、あらゆるモデルに使える。"},
    {q:"LIMEの説明生成の手順として正しいものはどれか？",
     opts:["モデルの重みを直接読み取る","入力を微小変化させた近傍データを生成し線形モデルで局所近似する","勾配を計算する","決定木に変換する"],ans:1,
     exp:"LIMEはある予測を説明する際、近傍に変形した入力でブラックボックスを多数評価し線形モデルで局所近似する。"},
    {q:"LIMEとSHAPの違いとして正しいものはどれか？",
     opts:["LIMEとSHAPは全く同じ手法","LIMEは特定事例の局所説明、SHAPは特徴量の貢献度を全体で計算","LIMEはCNN専用","SHAPはRNN専用"],ans:1,
     exp:"LIMEは個別の予測事例を局所的な線形モデルで説明。SHAPはShapley値で各特徴量の貢献度を理論的に計算する。"},
  ]
},

  questions:[
    {q:"XAIが必要とされる主な理由はどれか？",
     opts:["計算速度の向上","深層学習などのブラックボックス問題と高リスク分野での説明責任","データ収集の効率化","モデルの軽量化"],ans:1,
     exp:"複雑なAIモデルの判断根拠が不透明なブラックボックス問題と、医療・金融・法律など高リスク分野での説明責任がXAIの動機。"},
    {q:"XAIの代表的な手法として正しいものはどれか？",
     opts:["k-means・DBSCAN","LIME・SHAP・Grad-CAM","GAN・VAE","Momentum・Adam"],ans:1,
     exp:"LIME（局所近似）・SHAP（Shapley値）・Grad-CAM（CNNの注目領域可視化）がXAIの主要手法。"},
    {q:"EU AI法でXAIが特に求められる場面はどれか？",
     opts:["ゲームAI","リスクの高いAIシステム（医療・採用・信用評価等）","画像フィルタ","音楽生成"],ans:1,
     exp:"EU AI法ではリスクの高いAIシステムに対して意思決定の説明責任・透明性が義務付けられている。"},
  ]
},

  term:"GloVe・FastText（単語埋め込み）",category:"第6章 > 自然言語処理(NLP) > 単語埋め込み",

     exp:"GloVeはコーパス全体の単語共起統計を行列化し因数分解することで単語ベクトルを学習する（Word2Vecは局所ウィンドウを使用）。"},
    {q:"FastTextがWord2VecやGloVeより優れている点はどれか？",
     opts:["語彙サイズが小さい","サブワードで学習するため未知語・形態変化に対応できる","計算が遅い","英語のみ対応"],ans:1,

    {q:"Word2Vec・GloVe・FastTextに共通する学習目標はどれか？",

     exp:"3手法ともコーパスから「意味的・文脈的に近い単語が近いベクトル」になるよう単語の分散表現を学習する。"},

"Few-shot学習":{
  term:"Few-shot学習",category:"第6章 > 自然言語処理(NLP) > プロンプトエンジニアリング",
  explanation:"少数の例（few examples）をプロンプトに示すだけでモデルが新しいタスクを実行できる能力。Zero-shot（例なし）とMany-shot（多数例）の中間。GPT-3以降の大規模言語モデルで顕著に現れる「文脈内学習（In-context Learning）」の一形態。モデルの重みを更新せず、プロンプトに数例の「入力→出力」のデモンストレーションを与えるだけでタスクを解く。微調整（Fine-tuning）なしで汎用性を発揮できる点が画期的。",
  questions:[
    {q:"Few-shot学習の「Few-shot」が意味することはどれか？",
     opts:["大量のデータで学習","少数のデモンストレーション例をプロンプトに示してタスクを解く","モデルの重みを少し更新する","数回だけ推論する"],ans:1,
     exp:"Few-shotは少数の例（入力→出力のデモ）をプロンプトに含めるだけでモデルがタスクを実行できる能力。"},
    {q:"Few-shot学習でモデルの重みはどうなるか？",
     opts:["Fine-tuningで更新される","更新されない（プロンプトの例を見るだけで実行）","ランダムに初期化される","削除される"],ans:1,
     exp:"Few-shotはIn-context Learningの一種で、モデルパラメータを変えずにプロンプト内の例から学習・推論する。"},

    {q:"LLMの「ハルシネーション（Hallucination）」とはどのような問題か？",

function getProgress(){
  try{ return JSON.parse(localStorage.getItem('gkentei_progress')||'{}'); }catch(e){return {};}
}
function setProgress(p){ localStorage.setItem('gkentei_progress',JSON.stringify(p)); }
function markLearned(term){
  const p=getProgress(); p[term]=true; setProgress(p);
}
function unmarkLearned(term){
  const p=getProgress(); delete p[term]; setProgress(p);
}
function isLearned(term){ return !!getProgress()[term]; }
function setNodeGreen(term){
  document.querySelectorAll(`[data-term="${CSS.escape(term)}"]`).forEach(el=>{
    if(el.tagName==='rect'){el.setAttribute('fill','#1a4a30');el.setAttribute('stroke','#27ae60');}
    else if(el.tagName==='text') el.setAttribute('fill','#5dde8a');
  });
}
function setNodeDefault(term){
  document.querySelectorAll(`[data-term="${CSS.escape(term)}"]`).forEach(el=>{
    if(el.tagName==='rect'){
      el.setAttribute('fill','rgba(10,18,34,0.9)');
      el.setAttribute('stroke',el.getAttribute('data-color')||'#3498DB');
    } else if(el.tagName==='text') el.setAttribute('fill','#c8d8f8');
  });
}

// ══════════════════════════════════════════════════════════════
//  MIND MAP RENDERER  (SVG radial layout — proportional alloc)
// ══════════════════════════════════════════════════════════════
const ASPECT=0.899;
const R1=125, R2=250, R3=415;
const PALETTES=['#E74C3C','#E67E22','#F1C40F','#2ECC71','#1ABC9C','#3498DB','#9B59B6','#EC407A','#FF7043','#26A69A'];
const SIDE_SPAN=162*Math.PI/180; // 162° per side (total 324°, 18° gap at top/bottom)

let currentChapter=null;
let svgW=0,svgH=0;
let vx=0,vy=0,vz=1;
let dragStart=null,dragVStart=null;
let pinchDist0=null,pinchZ0=null;

function rxy(a,r){return [r*Math.cos(a), r*Math.sin(a)*ASPECT];}

function countLeaves(branch){
  return branch.children.reduce((s,c)=>s+Math.max(1,c.terms.length),0);
}

function renderMindMap(chapter,autoOpen){
  currentChapter=chapter;
  document.getElementById('map-title').textContent=chapter.title;
  const svg=document.getElementById('mindmap');
  svg.innerHTML='';
  const _mc=document.getElementById('map-container');
  const _rc=_mc.getBoundingClientRect();
  svgW=_rc.width  || _mc.clientWidth  || window.innerWidth;
  svgH=_rc.height || _mc.clientHeight || window.innerHeight*0.88;

  // auto-fit scale so full map is visible
  const extent=R3+90; // outermost radius + node half-width
  const extentY=R3*ASPECT+60;
  vz=Math.min(svgW/(extent*2), svgH/(extentY*2))*0.92;
  vx=svgW/2; vy=svgH/2;

  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.id='map-g';
  svg.appendChild(g);
  applyTransform(); // map-g追加後に呼ぶ

  if(!chapter.branches||chapter.branches.length===0){
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',0);txt.setAttribute('y',20);
    txt.setAttribute('text-anchor','middle');txt.setAttribute('fill','#6b7a99');
    txt.setAttribute('font-size','16');txt.textContent='準備中';
    g.appendChild(txt);
    drawCenter(g,chapter);
    return;
  }

  const right=chapter.branches.slice(0,Math.ceil(chapter.branches.length/2));
  const left=chapter.branches.slice(Math.ceil(chapter.branches.length/2));

  // ── Proportional allocation at every level ─────────────────
  // Each branch/child gets angle proportional to its leaf count.
  // L3 nodes spread within their parent's allocated sub-span.
  function drawSide(branches,isRight){
    if(!branches.length) return;
    const total=branches.reduce((s,b)=>s+countLeaves(b),0)||1;
    const sideStart=isRight ? -SIDE_SPAN/2 : Math.PI-SIDE_SPAN/2;
    let cursor=sideStart;

    branches.forEach((branch,bi)=>{
      const color=PALETTES[(bi+(isRight?0:right.length))%PALETTES.length];
      const branchLeaves=countLeaves(branch);
      const branchSpan=(branchLeaves/total)*SIDE_SPAN;
      const l1Angle=cursor+branchSpan/2;
      cursor+=branchSpan;

      const [lx,ly]=rxy(l1Angle,R1);
      drawCurve(g,0,0,lx,ly,color,2.5,0.8);
      drawL1(g,lx,ly,branch.l1,color);

      // L2: proportional within branchSpan
      const totalChildTerms=branch.children.reduce((s,c)=>s+Math.max(1,c.terms.length),0)||1;
      let l2Cur=l1Angle-branchSpan/2;

      branch.children.forEach((child)=>{
        const ct=Math.max(1,child.terms.length);
        const childSpan=(ct/totalChildTerms)*branchSpan;
        const l2Angle=l2Cur+childSpan/2;
        l2Cur+=childSpan;

        const [cx2,cy2]=rxy(l2Angle,R2);
        drawCurve(g,lx,ly,cx2,cy2,color,1.8,0.6);
        drawL2(g,cx2,cy2,child.l2,color);

        // L3: evenly spread within 80% of childSpan
        const nt=child.terms.length;
        const spread=childSpan*0.82;
        child.terms.forEach((term,ti)=>{
          const tf=nt<=1?0:(ti/(nt-1))-0.5;
          const l3Angle=l2Angle+tf*spread;
          const [tx3,ty3]=rxy(l3Angle,R3);
          drawCurve(g,cx2,cy2,tx3,ty3,color,1.2,0.45);
          drawTermNode(g,tx3,ty3,term,color,isLearned(term));
        });
      });
    });
  }

  drawSide(right,true);
  drawSide(left,false);
  drawCenter(g,chapter); // center drawn last → always on top

  // demo: auto-open a term with DB entry
  if(autoOpen){
    setTimeout(()=>openSheet(autoOpen),700);
  }
}

function drawCenter(g,chapter){
  const rx=65,ry=65*ASPECT;
  const el=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  el.setAttribute('cx',0);el.setAttribute('cy',0);
  el.setAttribute('rx',rx);el.setAttribute('ry',ry);
  el.setAttribute('fill','#1a2744');
  el.setAttribute('stroke',chapter.color||'#3a7bfd');
  el.setAttribute('stroke-width','2.5');
  g.appendChild(el);
  const lines=chapter.title.replace(/第\d+章\s*/,'').split(/[（\n]/);
  const lbl='第'+(chapter.id)+'章';
  addText(g,0,-10,lbl,'#7eb3ff',9,700,'middle');
  addText(g,0,4,lines[0]||'','#e8eaf0',8,600,'middle');
  if(lines[1]) addText(g,0,16,(lines[1]+'）').replace('））','）'),'#8892a4',7,400,'middle');
}

function drawL1(g,x,y,label,color){
  const fs=8.5,fw=700;
  const lines=wrapText(label,7);
  const lh=fs+2.5;
  const bw=Math.min(label.length*fs*0.58+14,70);
  const bh=lines.length*lh+7;
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x-bw/2);rect.setAttribute('y',y-bh/2);
  rect.setAttribute('width',bw);rect.setAttribute('height',bh);
  rect.setAttribute('rx',5);rect.setAttribute('fill',color);rect.setAttribute('opacity','0.95');
  g.appendChild(rect);
  lines.forEach((ln,i)=>{
    const ty=y-(lines.length-1)*lh/2+i*lh+1;
    addText(g,x,ty,ln,'#fff',fs,fw,'middle');
  });
}

function drawL2(g,x,y,label,color){
  const fs=7,fw=600;
  const lines=wrapText(label,8);
  const lh=fs+2;
  const bw=Math.min(label.length*fs*0.56+10,66);
  const bh=lines.length*lh+6;
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x-bw/2);rect.setAttribute('y',y-bh/2);
  rect.setAttribute('width',bw);rect.setAttribute('height',bh);
  rect.setAttribute('rx',4);
  rect.setAttribute('fill','rgba(15,25,40,0.92)');
  rect.setAttribute('stroke',color);rect.setAttribute('stroke-width','1.5');
  rect.setAttribute('class','term-node');
  rect.setAttribute('data-term',label);
  rect.style.cursor='pointer';
  g.appendChild(rect);
  lines.forEach((ln,i)=>{
    const ty=y-(lines.length-1)*lh/2+i*lh+1;
    addText(g,x,ty,ln,'#c8d8f8',fs,fw,'middle');
  });
}

function drawTermNode(g,x,y,term,color,learned){
  const fs=6.2;
  const hasDB=!!TERM_DB[term];
  const bw=Math.min(term.length*fs*0.6+14,80);
  const bh=fs+10;
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x-bw/2);rect.setAttribute('y',y-bh/2);
  rect.setAttribute('width',bw);rect.setAttribute('height',bh);
  rect.setAttribute('rx',5);
  rect.setAttribute('fill', learned?'#1a4a30': hasDB?'rgba(10,18,34,0.9)':'rgba(22,24,38,0.75)');
  rect.setAttribute('stroke', learned?'#27ae60': hasDB?color:'#363a54');
  rect.setAttribute('stroke-width', hasDB?'1.2':'0.8');
  rect.setAttribute('class','term-node');
  rect.setAttribute('data-term',term);
  rect.setAttribute('data-color',color);
  rect.style.cursor='pointer';
  g.appendChild(rect);
  const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x',x);txt.setAttribute('y',y+2.2);
  txt.setAttribute('text-anchor','middle');
  txt.setAttribute('fill', learned?'#5dde8a': hasDB?'#c8d8f8':'#484d6a');
  txt.setAttribute('font-size',fs);
  txt.setAttribute('font-weight', hasDB?'600':'400');
  txt.setAttribute('font-family','-apple-system,"Hiragino Sans","Yu Gothic",sans-serif');
  txt.textContent=term;
  txt.setAttribute('class','term-node');
  txt.setAttribute('data-term',term);
  txt.style.pointerEvents='none';
  g.appendChild(txt);
}

function drawCurve(g,x0,y0,x1,y1,color,lw,alpha){
  const mx=(x0+x1)/2, my=(y0+y1)/2;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',`M${x0},${y0} C${mx},${y0} ${mx},${y1} ${x1},${y1}`);
  p.setAttribute('fill','none');p.setAttribute('stroke',color);
  p.setAttribute('stroke-width',lw);p.setAttribute('opacity',alpha);
  g.appendChild(p);
}

function addText(g,x,y,txt,fill,fs,fw,anchor){
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x);t.setAttribute('y',y);
  t.setAttribute('text-anchor',anchor);
  t.setAttribute('fill',fill);t.setAttribute('font-size',fs);
  t.setAttribute('font-weight',fw);
  t.setAttribute('font-family','-apple-system,"Hiragino Sans","Yu Gothic",sans-serif');
  t.textContent=txt;
  g.appendChild(t);
}

function wrapText(str,maxLen){
  if(str.length<=maxLen) return [str];
  const mid=Math.ceil(str.length/2);
  return [str.slice(0,mid),str.slice(mid)];
}

// ── Transform ──
function applyTransform(){
  const g=document.getElementById('map-g');
  if(!g)return;
  g.setAttribute('transform',`translate(${vx},${vy}) scale(${vz})`);
}

// ══════════════════════════════════════════════════════════════
//  TOUCH / MOUSE EVENTS
// ══════════════════════════════════════════════════════════════
const wrap=document.getElementById('map-svg-wrap');

function getDist(t){
  return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
}

wrap.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('term-node')){return;}
  dragStart={x:e.clientX,y:e.clientY};
  dragVStart={x:vx,y:vy};
});
wrap.addEventListener('mousemove',e=>{
  if(!dragStart)return;
  vx=dragVStart.x+(e.clientX-dragStart.x);
  vy=dragVStart.y+(e.clientY-dragStart.y);
  applyTransform();
});
wrap.addEventListener('mouseup',()=>{ dragStart=null; });

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.1:0.91;
  const rect=wrap.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  vx=(vx-mx)*factor+mx;
  vy=(vy-my)*factor+my;
  vz=Math.min(4,Math.max(0.2,vz*factor));
  applyTransform();
},{passive:false});

let lastTap=0,lastTapTarget=null;
wrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchDist0=getDist(e.touches);
    pinchZ0=vz;
    dragStart=null;
  } else if(e.touches.length===1){
    const t=e.touches[0];
    dragStart={x:t.clientX,y:t.clientY};
    dragVStart={x:vx,y:vy};
    pinchDist0=null;
    // tap detection
    const now=Date.now();
    if(now-lastTap<300 && e.target===lastTapTarget){/* dbl-tap zoom skip */}
    lastTap=now; lastTapTarget=e.target;
  }
},{passive:true});

wrap.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinchDist0!==null){
    e.preventDefault();
    const d=getDist(e.touches);
    const factor=d/pinchDist0;
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const rect=wrap.getBoundingClientRect();
    const mx=cx-rect.left, my=cy-rect.top;
    const nz=Math.min(4,Math.max(0.2,pinchZ0*factor));
    const ratio=nz/vz;
    vx=(vx-mx)*ratio+mx;
    vy=(vy-my)*ratio+my;
    vz=nz;
    applyTransform();
  } else if(e.touches.length===1&&dragStart){
    e.preventDefault();
    const t=e.touches[0];
    vx=dragVStart.x+(t.clientX-dragStart.x);
    vy=dragVStart.y+(t.clientY-dragStart.y);
    applyTransform();
  }
},{passive:false});

let touchMoved=false;
wrap.addEventListener('touchstart',()=>{touchMoved=false;},{passive:true});
wrap.addEventListener('touchmove',()=>{touchMoved=true;},{passive:true});
wrap.addEventListener('touchend',e=>{
  dragStart=null; pinchDist0=null;
  if(!touchMoved){
    const el=document.elementFromPoint(
      e.changedTouches[0].clientX, e.changedTouches[0].clientY
    );
    if(el&&el.dataset.term) openSheet(el.dataset.term);
  }
},{passive:true});

wrap.addEventListener('click',e=>{
  if(e.target.dataset.term) openSheet(e.target.dataset.term);
});

// ══════════════════════════════════════════════════════════════
//  BOTTOM SHEET
// ══════════════════════════════════════════════════════════════
function openSheet(term){
  const db=TERM_DB[term];
  if(!db){
    // no DB entry: show basic info
    document.getElementById('sheet-term').textContent=term;
    document.getElementById('sheet-category').textContent='';
    document.getElementById('sheet-explanation').textContent='詳細は準備中です。';
    document.getElementById('quiz-area').innerHTML='';
  } else {
    document.getElementById('sheet-term').textContent=db.term;
    document.getElementById('sheet-category').textContent=db.category;
    document.getElementById('sheet-explanation').textContent=db.explanation;
    renderQuiz(db.questions, term);
  }
  document.getElementById('sheet-bg').style.display='block';
  document.getElementById('sheet').classList.add('open');
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  setTimeout(()=>{ document.getElementById('sheet-bg').style.display='none'; },300);
}

document.getElementById('sheet-close').addEventListener('click',closeSheet);
document.getElementById('sheet-bg').addEventListener('click',closeSheet);

// swipe down to close
let sheetTouchY=null;
document.getElementById('sheet').addEventListener('touchstart',e=>{
  sheetTouchY=e.touches[0].clientY;
},{passive:true});
document.getElementById('sheet').addEventListener('touchend',e=>{
  if(sheetTouchY!==null&&e.changedTouches[0].clientY-sheetTouchY>60) closeSheet();
  sheetTouchY=null;
},{passive:true});

function renderQuiz(questions, term){
  const area=document.getElementById('quiz-area');
  if(!questions||!questions.length){ area.innerHTML=''; return; }
  area.innerHTML='<h3>確認問題</h3>';
  let correctCount=0;
  const totalQ=questions.length;
  questions.forEach((q,qi)=>{
    const block=document.createElement('div');
    block.className='quiz-block';
    const qText=document.createElement('div');
    qText.className='quiz-q';
    qText.textContent=`Q${qi+1}. ${q.q}`;
    block.appendChild(qText);
    const opts=document.createElement('div');
    opts.className='quiz-opts';
    q.opts.forEach((opt,oi)=>{
      const btn=document.createElement('button');
      btn.className='quiz-opt';
      btn.textContent=`${['A','B','C','D'][oi]}. ${opt}`;
      btn.addEventListener('click',()=>{
        if(btn.classList.contains('disabled')) return;
        block.querySelectorAll('.quiz-opt').forEach(b=>b.classList.add('disabled'));
        if(oi===q.ans){
          btn.classList.add('correct');
          correctCount++;
          if(correctCount===totalQ && term){
            markLearned(term);
            setNodeGreen(term);
          }
        } else {
          btn.classList.add('wrong');
          block.querySelectorAll('.quiz-opt')[q.ans].classList.add('correct');
          if(term && isLearned(term)){
            unmarkLearned(term);
            setNodeDefault(term);
          }
        }
        expDiv.classList.add('show');
      });
      opts.appendChild(btn);
    });
    block.appendChild(opts);
    const expDiv=document.createElement('div');
    expDiv.className='quiz-exp';
    expDiv.textContent=`解説: ${q.exp}`;
    block.appendChild(expDiv);
    area.appendChild(block);
  });
  const resetBtn=document.createElement('button');
  resetBtn.className='quiz-reset-btn';
  resetBtn.textContent='↺ 回答をリセット';
  resetBtn.addEventListener('click',()=>{
    if(term){ unmarkLearned(term); setNodeDefault(term); }
    renderQuiz(questions,term);
  });
  area.appendChild(resetBtn);
}

// ══════════════════════════════════════════════════════════════
//  HOME SCREEN
// ══════════════════════════════════════════════════════════════
function renderHome(){
  const list=document.getElementById('chapter-list');
  list.innerHTML='';
  const progress=getProgress();
  CHAPTERS.forEach(ch=>{
    const card=document.createElement('div');
    card.className='chapter-card';
    const allTerms=[];
    ch.branches.forEach(b=>b.children.forEach(c=>c.terms.forEach(t=>allTerms.push(t))));
    const learned=allTerms.filter(t=>progress[t]).length;
    const total=allTerms.length;
    const pct=total?Math.round(learned/total*100):0;
    card.innerHTML=`
      <h2>${ch.title}</h2>
      <div class="chapter-summary">${CHAPTER_SUMMARIES[ch.id]||''}</div>
      <div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${ch.color}"></div></div>
        <div class="progress-txt">${learned}/${total} 用語 (${pct}%)</div>
      </div>
    `;
    if(ch.branches.length>0){
      card.addEventListener('click',()=>openMap(ch));
    }
    list.appendChild(card);
  });
}

function openMap(chapter){
  document.getElementById('home').style.display='none';
  document.getElementById('mapview').style.display='flex';
  // 2フレーム待ってflex layoutが確定してから描画
  requestAnimationFrame(()=>requestAnimationFrame(()=>renderMindMap(chapter,null)));
}

document.getElementById('btn-back').addEventListener('click',()=>{
  document.getElementById('mapview').style.display='none';
  document.getElementById('home').style.display='flex';
  renderHome();
});

// ══════════════════════════════════════════════════════════════
//  SYLLABUS
// ══════════════════════════════════════════════════════════════
function buildSyllabus(){
  const list=document.getElementById('syllabus-list');
  list.innerHTML='';
  CHAPTERS.forEach(ch=>{
    const chTitle=ch.title.replace('\n',' ');
    const div=document.createElement('div');
    div.className='syl-ch';

    const hd=document.createElement('div');
    hd.className='syl-ch-hd';
    hd.innerHTML=`<span class="syl-ch-dot" style="background:${ch.color}"></span>
      <span class="syl-ch-title">${chTitle}</span>
      <span class="syl-ch-arrow">▶</span>`;

    const body=document.createElement('div');
    body.className='syl-ch-body';

    ch.branches.forEach(b=>{
      const l1=document.createElement('div');
      l1.className='syl-l1';
      l1.textContent=b.l1;
      body.appendChild(l1);

      b.children.forEach(c=>{
        const row=document.createElement('div');
        row.className='syl-l2-row';

        const lbl=document.createElement('div');
        lbl.className='syl-l2-label';
        lbl.textContent=c.l2;
        row.appendChild(lbl);

        const tags=document.createElement('div');
        tags.className='syl-terms';
        c.terms.forEach(t=>{
          const hasDB=!!TERM_DB[t];
          const tag=document.createElement('span');
          tag.className=`syl-tag ${hasDB?'reg':'unreg'}`;
          if(hasDB) tag.style.borderColor=ch.color;
          tag.textContent=t;
          tag.addEventListener('click',()=>{
            closeSyllabus();
            navigateToTerm({term:t,chapter:ch,path:`${chTitle} › ${b.l1} › ${c.l2}`,hasDB});
          });
          tags.appendChild(tag);
        });
        row.appendChild(tags);
        body.appendChild(row);
      });
    });

    hd.addEventListener('click',()=>{
      const arrow=hd.querySelector('.syl-ch-arrow');
      const open=body.classList.toggle('open');
      arrow.style.transform=open?'rotate(90deg)':'';
    });

    div.appendChild(hd);
    div.appendChild(body);
    list.appendChild(div);
  });
}

function openSyllabus(){
  buildSyllabus();
  document.getElementById('syllabus-overlay').style.display='flex';
}
function closeSyllabus(){
  document.getElementById('syllabus-overlay').style.display='none';
}
document.getElementById('syllabus-open-btn').addEventListener('click',openSyllabus);
document.getElementById('syllabus-close-btn').addEventListener('click',closeSyllabus);

// ══════════════════════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════════════════════
let _searchIndex = null;

function buildSearchIndex(){
  if(_searchIndex) return _searchIndex;
  _searchIndex = [];
  CHAPTERS.forEach(ch=>{
    const chTitle = ch.title.replace('\n',' ');
    ch.branches.forEach(b=>{
      b.children.forEach(c=>{
        // L2ノード
        _searchIndex.push({term:c.l2, chapter:ch, path:`${chTitle} › ${b.l1}`, isL2:true});
        // L3ノード
        c.terms.forEach(t=>{
          _searchIndex.push({term:t, chapter:ch, path:`${chTitle} › ${b.l1} › ${c.l2}`, isL2:false});
        });
      });
    });
  });
  return _searchIndex;
}

function doSearch(query){
  if(!query.trim()) return [];
  const q = query.toLowerCase();
  const idx = buildSearchIndex();
  const seen = new Set();
  const results = [];

  idx.forEach(item=>{
    if(seen.has(item.term)) return;
    const tl = item.term.toLowerCase();
    const db = TERM_DB[item.term];
    const inTerm = tl.includes(q);
    const inExpl = db && (db.explanation.toLowerCase().includes(q) || db.term.toLowerCase().includes(q));
    if(inTerm || inExpl){
      seen.add(item.term);
      results.push({...item, exact:(tl===q), hasDB:!!db});
    }
  });

  results.sort((a,b)=>{
    if(a.exact !== b.exact) return a.exact?-1:1;
    if(a.hasDB !== b.hasDB) return a.hasDB?-1:1;
    return 0;
  });
  return results.slice(0,25);
}

function renderSearchResults(results, query){
  const area = document.getElementById('search-results');
  if(!query.trim()){ area.innerHTML=''; return; }
  if(!results.length){
    area.innerHTML=`<div class="search-empty">「${query}」に一致する用語が見つかりません</div>`;
    return;
  }
  area.innerHTML = results.map((r,i)=>`
    <div class="search-item" data-i="${i}">
      <div class="search-term">${r.term}</div>
      <div class="search-path">${r.path}</div>
      <span class="search-db ${r.hasDB?'has':'none'}">${r.hasDB?'問題あり':'準備中'}</span>
    </div>
  `).join('');
  area.querySelectorAll('.search-item').forEach(el=>{
    el.addEventListener('click',()=>navigateToTerm(results[+el.dataset.i]));
  });
}

function navigateToTerm(item){
  closeSearch();
  // ホーム→マップ遷移してからジャンプ
  const alreadyOnMap = document.getElementById('mapview').style.display==='flex';
  if(alreadyOnMap && currentChapter && currentChapter.id===item.chapter.id){
    jumpToNode(item.term);
    if(item.hasDB) setTimeout(()=>openSheet(item.term), 350);
  } else {
    openMap(item.chapter);
    setTimeout(()=>{
      jumpToNode(item.term);
      if(item.hasDB) setTimeout(()=>openSheet(item.term), 350);
    }, 280);
  }
}

function jumpToNode(term){
  const els = document.querySelectorAll(`[data-term="${CSS.escape(term)}"]`);
  let nx=null, ny=null;
  els.forEach(el=>{
    if(nx!==null) return;
    if(el.tagName==='rect'){
      nx = parseFloat(el.getAttribute('x')) + parseFloat(el.getAttribute('width'))/2;
      ny = parseFloat(el.getAttribute('y')) + parseFloat(el.getAttribute('height'))/2;
    }
  });
  if(nx===null) return;

  // 現在のズームを維持しつつ、少なくとも1.5倍に
  vz = Math.max(vz, 1.5);
  vx = svgW/2 - nx*vz;
  vy = svgH/2 - ny*vz;
  applyTransform();

  // 白くフラッシュしてハイライト
  setTimeout(()=>{
    els.forEach(el=>{
      if(el.tagName!=='rect') return;
      const origStroke = el.getAttribute('stroke');
      const origSW = el.getAttribute('stroke-width');
      el.setAttribute('stroke','#ffffff');
      el.setAttribute('stroke-width','3');
      setTimeout(()=>{
        el.setAttribute('stroke', origStroke);
        el.setAttribute('stroke-width', origSW);
      }, 1600);
    });
  }, 60);
}

function openSearch(){
  document.getElementById('search-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('search-input').focus(),80);
}
function closeSearch(){
  document.getElementById('search-overlay').style.display='none';
  document.getElementById('search-input').value='';
  document.getElementById('search-results').innerHTML='';
}

document.getElementById('search-open-btn').addEventListener('click', openSearch);
document.getElementById('search-open-btn-map').addEventListener('click', openSearch);
document.getElementById('search-cancel').addEventListener('click', closeSearch);
document.getElementById('search-input').addEventListener('input', e=>{
  renderSearchResults(doSearch(e.target.value), e.target.value);
});

// ── Init ──
renderHome();
</script>
